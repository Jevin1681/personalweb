<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Record</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .card {
            max-width: 520px;
            margin: auto;
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.85);
            border-radius: 22px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(102,126,234,0.15);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(0,0,0,0.07);
        }
        .card-header .icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .card-header h2 { color: #1a202c; font-size: 18px; font-weight: 700; }
        .card-header p { color: #718096; font-size: 12px; margin-top: 2px; }

        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(255,255,255,0.75);
            border: 1px solid #cbd5e0;
            border-radius: 10px;
            color: #1a202c;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input::placeholder { color: #a0aec0; }
        .field input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
            background: #fff;
        }

        .row-2 { display: flex; gap: 12px; }
        .row-2 .field { flex: 1; }
        .row-3 { display: flex; gap: 12px; }
        .row-3 .field { flex: 1; }

        .btn-save {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(102,126,234,0.35);
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-save:hover { opacity: 0.88; transform: translateY(-1px); }

        .cancel-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: #718096;
            text-decoration: none;
            font-size: 13px;
        }
        .cancel-link:hover { color: #2d3748; }

        @media (max-width: 480px) {
            .row-2, .row-3 { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="icon">➕</div>
            <div>
                <h2>Add New Record</h2>
                <p>Fill in the details below</p>
            </div>
        </div>

        <form action="/save" method="POST">
            <div class="field">
                <label>Full Name *</label>
                <input type="text" name="fullname" placeholder="Enter full name" required>
            </div>
            <div class="row-2">
                <div class="field">
                    <label>Prasang</label>
                    <input type="text" name="prasang" placeholder="e.g. Lagna">
                </div>
                <div class="field">
                    <label>P-Name</label>
                    <input type="text" name="pname" placeholder="Person name">
                </div>
            </div>
            <div class="row-2">
                <div class="field">
                    <label>Tarikh (Date)</label>
                    <input type="date" name="tarikh">
                </div>
                <div class="field">
                    <label>City</label>
                    <input type="text" name="city" placeholder="City">
                </div>
            </div>
            <div class="row-3">
                <div class="field">
                    <label>Chandlo (₹)</label>
                    <input type="number" name="chandlo" placeholder="0" min="0">
                </div>
                <div class="field">
                    <label>Vasan (₹)</label>
                    <input type="number" name="vasan" placeholder="0" min="0">
                </div>
                <div class="field">
                    <label>Anya (₹)</label>
                    <input type="number" name="anya" placeholder="0" min="0">
                </div>
            </div>
            <div class="row-2">
                <div class="field">
                    <label>Notru</label>
                    <input type="text" name="notru" placeholder="Notru">
                </div>
                <div class="field">
                    <label>Gone Status</label>
                    <input type="text" name="gone" placeholder="Haa / Naa">
                </div>
            </div>

            <button type="submit" class="btn-save">💾 Save Record</button>
            <a href="/" class="cancel-link">✕ Cancel</a>
        </form>
    </div>
</body>
</html>
